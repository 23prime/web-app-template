# ================================================================
# Settings
# ================================================================
[settings]
auto_install = false
minimum_release_age = "3d"


# ================================================================
# Tools
# ================================================================
[tools]

# Node.js
node = "26"

# Database
atlas = "1"
"github:quarylabs/sqruff" = "0.38"

# Testing
"github:k1LoW/runn" = "1"

# Markdown
markdownlint-cli2 = "0.23.0"

# GitHub Actions
actionlint = "1"
shellcheck = "0.11"
zizmor = "1.26.1"

# Git
lefthook = "2"
betterleaks = "v1.6.1"

# Spell Check
cspell = "10"


# ================================================================
# Environment Variables
# ================================================================
[env]
CORS_ALLOWED_ORIGINS = "http://localhost:3000"
DATABASE_URL = "postgres://postgres:password@localhost:5432/app_development?sslmode=disable"
DEV_DATABASE_URL = "postgres://postgres:password@localhost:5432/postgres?sslmode=disable"
TEST_DATABASE_URL = "postgres://postgres:password@localhost:5432/app_test?sslmode=disable"
LOG_FORMAT = "text"
LOG_LEVEL = "debug"
PORT = "8080"


# ================================================================
# Tasks
# See: https://mise.jdx.dev/tasks/toml-tasks.html
# ================================================================

# Global
[tasks.setup]
description = "Setup tools"
env = { GITHUB_TOKEN = "{{ exec(command='gh auth token') }}" }
run = ["mise trust -yq", "mise install", "lefthook install"]
alias = "s"

[tasks.fix]
description = "Fix all issues"
depends = ["md-fix", "gh-fix", "rs-fix", "sql-fix"]
alias = "f"

[tasks.check]
description = "Check for all issues"
depends = [
  "md-check",
  "gh-check",
  "spell-check",
  "secret-check-all",
  "rs-check",
  "sql-check",
]
alias = "c"

[tasks.fix-and-check]
run = [{ task = "fix" }, { task = "check" }]
description = "Fix all issues and check for issues"
alias = "fc"

# Markdown
[tasks.md-fix]
description = "Fix Markdown issues"
run = "markdownlint-cli2 '**/*.md' --fix"
alias = "mf"

[tasks.md-check]
description = "Check for Markdown issues"
run = "markdownlint-cli2 '**/*.md'"
alias = "mc"

# GitHub Actions
[tasks.gh-fix]
description = "Fix GitHub Actions workflows"
run = "zizmor --fix=all ."
alias = "ghf"

[tasks.gh-check]
description = "Check GitHub Actions workflows"
run = [
  "actionlint .github/workflows/*.yml",
  "zizmor . --persona=pedantic --min-severity=low",
]
alias = "ghc"

# Spell Check
[tasks.spell-check]
description = "Check spelling"
run = "cspell . --gitignore --verbose"
alias = "sc"

# Rust
[vars]
app_dir = "app"

[tasks.rs-install]
description = "Install Rust dependencies"
run = "cargo fetch"
dir = "{{vars.app_dir}}"

[tasks.rs-fix]
description = "Fix Rust code"
run = [
  "cargo clippy --all-targets --all-features --no-deps --fix --allow-dirty",
  "cargo fmt",
]
alias = "rf"
dir = "{{vars.app_dir}}"

[tasks.rs-check]
description = "Check Rust code"
run = [
  "cargo clippy --all-targets --all-features --no-deps",
  "cargo fmt -- --check",
  "cargo test -- --nocapture",
]
alias = "rc"
dir = "{{vars.app_dir}}"

[tasks.rs-run]
description = "Run Rust application"
run = "cargo run"
alias = "rr"
dir = "{{vars.app_dir}}"

[tasks.rs-watch]
description = "Watch for file changes and reload Rust application"
run = "watchexec --exts rs,toml --restart -- cargo run"
alias = "rw"
dir = "{{vars.app_dir}}"

[tasks.rs-build]
description = "Build Rust application"
run = "cargo build"
dir = "{{vars.app_dir}}"

[tasks.rs-build-release]
description = "Build Rust application in release mode"
run = "cargo build --release"
dir = "{{vars.app_dir}}"

[tasks.rs-clean]
description = "Clean Rust build artifacts"
run = "cargo clean"
dir = "{{vars.app_dir}}"

# Database
[tasks.db-up]
description = "Start the database container"
run = "docker compose up db"

[tasks.db-up-d]
description = "Start the database container in detached mode and wait for it to be ready"
run = "docker compose up db -d --wait"

[tasks.db-stop]
description = "Stop the database container"
run = "docker compose stop db"

[tasks.db-down]
description = "Stop and remove the database container"
run = "docker compose down db"

[tasks.db-logs]
description = "Follow database container logs"
run = "docker compose logs db -f"

[tasks.db-diff]
description = "Show diff between schema.sql and the database"
run = "atlas schema diff --from \"${DATABASE_URL}\" --to file://schema.sql --dev-url \"${DEV_DATABASE_URL}\""
dir = "db"

[tasks.db-apply]
description = "Apply schema to the database"
run = "atlas schema apply --env local --config file://atlas.hcl --auto-approve"
dir = "db"

# SQL
[tasks.sql-fix]
description = "Fix SQL files"
run = "sqruff fix db/schema.sql"
alias = "sf"

[tasks.sql-check]
description = "Check SQL files"
run = "sqruff lint db/schema.sql"
alias = "sc"

# Seeder
[tasks.seed]
description = "Seed database for the specified environment (ENV=local)"
run = "ENV=\"${ENV:-local}\" cargo run --bin seeder"
dir = "{{vars.app_dir}}"
# Secrets
[tasks.secret-check]
description = "Check staged files for leaked secrets"
run = "betterleaks git --pre-commit --redact --no-banner"
alias = "scc"

[tasks.secret-check-all]
description = "Check for leaked secrets"
run = "betterleaks git --redact --no-banner"
alias = "sca"
